<!DOCTYPE html>
<html>
<head>
    <title>Log Offsets | Carbon Tracker</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #061A40; color: #B9D6F2; font-family: 'Segoe UI', sans-serif; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #061A40; height: 60px; padding: 0 30px;
            border-bottom: 1px solid #003559;
        }
        .topbar a { text-decoration: none; color: #B9D6F2; cursor: pointer; }
        .sidebar {
            height: 100%; width: 260px; position: fixed; top: 0; left: -260px;
            background-color: #003559; transition: 0.3s; padding-top: 60px; z-index: 999;
        }
        .sidebar a {
            padding: 15px; text-align: left; text-decoration: none; font-size: 17px;
            color: #B9D6F2; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #004a7c;
        }
        .sidebar a:hover { background-color: #006DAA; }
        .sidebar a.active { background-color: #006DAA; }
        .content { padding: 40px 20px; text-align: center; }
        .form-card {
            background: #003559; border-radius: 16px; padding: 32px 40px;
            max-width: 480px; margin: 0 auto; border: 1px solid #006DAA; text-align: left;
        }
        label { font-size: 14px; color: #7aafc8; margin-bottom: 4px; display: block; }
        select {
            background-color: #061A40; color: #B9D6F2; border: 1px solid #006DAA;
            border-radius: 8px; padding: 8px 12px; width: 100%; margin-bottom: 18px; font-size: 15px;
        }
        select:focus { outline: none; border-color: #90EE90; }
        .btn-submit {
            background-color: #006DAA; color: white; border: none; padding: 12px 32px;
            border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 8px;
        }
        .btn-submit:hover { background-color: #90EE90; color: #061A40; }
        h2 { font-size: 22px; margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: #7aafc8; margin-bottom: 24px; }
    </style>
</head>
<body>

<div class="topbar">
    <a href="javascript:void(0)" style="font-size:28px;" onclick="openNav()">&#9776;</a>
    <h2 style="font-size:24px; margin:0;">🌱 Log Your Offsets</h2>
    <a href="#" style="font-size: 36px;"><span class="material-symbols-outlined">account_circle</span></a>
</div>

<div class="sidebar" id="mySidebar">
    <a href="javascript:void(0)" onclick="closeNav()" style="font-size:20px;">✕ &nbsp; Close</a>
    <a href="{{ url_for('hello_world') }}"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
    <a href="{{ url_for('basic_info') }}"><span class="material-symbols-outlined">face</span> Your Basic Info</a>
    <a href="{{ url_for('today') }}"><span class="material-symbols-outlined">add_task</span> Log Today's Activities</a>
    <a href="{{ url_for('points') }}"><span class="material-symbols-outlined">public</span> View Carbon History</a>
    <a href="{{ url_for('offset') }}" class="active"><span class="material-symbols-outlined">potted_plant</span> Log Offsets</a>
</div>

<div class="content">
    <div class="form-card">
        <h2>Good things you did today 🌍</h2>
        <p class="subtitle">Every offset counts toward your net carbon score.</p>
        <form action="/upload_offsets" method="post">

            <label>🚶 Did you walk to work/class today?</label>
            <select id="walk" name="walk">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~2 kg CO₂</option>
            </select>

            <label>🚗 Did you carpool instead of driving alone?</label>
            <select id="carpool" name="carpool">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~3 kg CO₂</option>
            </select>

            <label>🚲 Did you cycle instead of driving?</label>
            <select id="cycle" name="cycle">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~3.5 kg CO₂</option>
            </select>

            <label>🌳 Did you plant a tree today?</label>
            <select id="tree" name="tree">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~5 kg CO₂</option>
            </select>

            <label>🚌 Did you use public transport?</label>
            <select id="pubtrans" name="pubtrans">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~2.5 kg CO₂</option>
            </select>

            <label>♻️ Did you recycle plastic today?</label>
            <select id="recycle" name="recycle">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~1.5 kg CO₂</option>
            </select>

            <label>🧹 Did you join a community cleanup?</label>
            <select id="cleanup" name="cleanup">
                <option value="no">No</option>
                <option value="yes">Yes — saves ~4 kg CO₂</option>
            </select>

            <button type="submit" class="btn-submit">Save Offsets ✓</button>
        </form>
    </div>
</div>

<script>
    function openNav() { document.getElementById("mySidebar").style.left = "0"; }
    function closeNav() { document.getElementById("mySidebar").style.left = "-260px"; }
</script>
</body>
</html>
